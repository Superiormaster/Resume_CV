{% extends "base.html" %}
{% block title %}Contact & Support{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto px-4 py-8">

  <!-- Header -->
  <div class="mb-10 text-center">
    <h1 class="mb-6 text-center text-4xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-500 to-cyan-400 text-3xl font-bold mb-2">Contact & Support</h1>
    <p class="text-gray-400">
      Send us a message, share feedback, or report an issue.
    </p>
  </div>
  
  <!-- Quick links -->
  <div class="flex justify-center gap-4 mb-8 text-sm">
    <a href="{{ url_for('meta_bp.contact') }}?type=contact"
       class="text-blue-400 hover:underline">Contact</a>
    <a href="{{ url_for('meta_bp.contact') }}?type=feedback"
       class="text-blue-400 hover:underline">Feedback</a>
    <a href="{{ url_for('meta_bp.contact') }}?type=report"
       class="text-blue-400 hover:underline">Report</a>
  </div>

  <!-- Form -->
  <form method="POST" onsubmit="return validateForm()" class="space-y-4 bg-gray-800 p-6 border text-black border-rose-100 rounded-lg shadow-lg bg-gray-900 border border-gray-800 rounded-xl p-6 space-y-5">

    <!-- Honeypot (spam protection) -->
    <input type="text" name="website" class="hidden">

    <!-- Type -->
    <div>
      <label class="block text-sm text-gray-400 font-medium mb-1">Message Type</label>
      <select name="type" id="typeSelect" required
        class="w-full rounded-lg focus:outline-none py-3 px-4 border-white/10 bg-white/10 border text-black transition focus:bg-blue-500/5 focus:border-blue-500 text-sm">
        <option value="">Select one</option>
        <option value="contact">Contact</option>
        <option value="feedback">Feedback</option>
        <option value="report">Report a problem</option>
      </select>
    </div>

    <!-- Name -->
    <div>
      <label class="block text-sm text-gray-400 mb-1 font-medium">Name (optional)</label>
      <input type="text" name="name"
        class="w-full rounded-lg focus:outline-none py-3 px-4 border-white/10 bg-white/10 border transition focus:bg-blue-500/5 focus:border-blue-500 text-sm"
        placeholder="Your name">
    </div>

    <!-- Email -->
    <div>
      <label class="block text-sm text-gray-400 font-medium mb-1">Email address</label>
      <input type="email"
        name="email" required
        class="w-full rounded-lg focus:outline-none py-3 px-4 border-white/10 bg-white/10 border transition focus:bg-blue-500/5 focus:border-blue-500 text-sm"
        placeholder="you@example.com">
    </div>

    <!-- Subject -->
    <div>
      <label class="block text-sm text-gray-400 mb-1 font-medium">Subject (optional)</label>
      <input type="text" name="subject"
        class="w-full rounded-lg focus:outline-none py-3 px-4 border-white/10 bg-white/10 border transition focus:bg-blue-500/5 focus:border-blue-500 text-sm"
        placeholder="Brief subject">
    </div>

    <!-- Message -->
    <div>
      <label class="block text-sm mb-1 font-medium text-gray-400">Message</label>
      <textarea name="content" rows="6" required
        class="w-full rounded-lg focus:outline-none py-3 px-4 border-white/10 bg-white/10 border t
        transition focus:bg-blue-500/5 focus:border-blue-500 text-sm"
        placeholder="Write your message here..."></textarea>
    </div>

    <!-- Submit -->
    <div class="flex justify-end">
      <button type="submit"
        class="w-full text-black font-semibold rounded-lg transition-colors duration-200 py-3 bg-blue-300 shadow-lg hover:bg-blue-700 transition relative overflow-hidden hover:-translate-y-0.5 hover:shadow-[0_0_15px_rgba(50,130,246,0.4)] bg-blue-600 hover:bg-blue-700 px-6 py-2 rounded-lg">
        Send Message
      </button>
    </div>
  </form>

</div>

<script>
/* Auto-change placeholder */
const typeSelect = document.getElementById("typeSelect");
const messageBox = document.getElementById("messageBox");

const placeholders = {
  contact: "Write your message here...",
  feedback: "Share your ideas or suggestions...",
  report: "Describe the issue in detail..."
};

typeSelect.addEventListener("change", () => {
  messageBox.placeholder = placeholders[typeSelect.value] || "";
});

/* Preselect type from URL */
const params = new URLSearchParams(window.location.search);
const presetType = params.get("type");
if (presetType) {
  typeSelect.value = presetType;
  messageBox.placeholder = placeholders[presetType] || "";
}

/* Client-side validation */
function validateForm() {
  if (!typeSelect.value) {
    alert("Please select a message type.");
    return false;
  }
  if (messageBox.value.trim().length < 10) {
    alert("Message must be at least 10 characters.");
    return false;
  }
  return true;
}
</script>

{% endblock %}
